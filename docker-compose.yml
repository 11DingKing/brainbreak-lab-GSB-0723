version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: brainbreak-postgres
    environment:
      POSTGRES_USER: brainbreak
      POSTGRES_PASSWORD: brainbreak
      POSTGRES_DB: brainbreak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainbreak -d brainbreak"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brainbreak-server
    environment:
      DATABASE_URL: postgres://brainbreak:brainbreak@postgres:5432/brainbreak?sslmode=disable
      SERVER_ADDR: :8080
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
